<html lang="en" data-theme="pastel">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>West Clermont Email Generator</title>
  <link href="output.css" rel="stylesheet" type="text/css" />
  <style>
    body {
      zoom: 1.5;
    }

    @supports not (zoom: 1.5) {
      body {
        transform: scale(1.5);
        transform-origin: top left;
        width: 66.6667%;
      }
    }
  </style>
</head>
<body class="bg-base-200">
  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <div class="mx-auto max-w-3xl py-12 flex">

      <form id="info_form" class="w-full" onsubmit="form_submit();">
        <fieldset class="fieldset bg-white border-base-300 shadow-xl rounded-box w-full border p-4">
          <label class="label">Full Name</label>
          <input required type="text" id="full_name" class="input w-full" placeholder="David Fultz" />
        
          <label class="label">Email Address</label>
          <input required type="email" id="email" class="input w-full" placeholder="fultz_d@my.westcler.org" />
  
          <label class="label">Job Title</label>
          <input required type="text" id="job_title" class="input w-full" placeholder="Superintendent" />
  
          <label class="label">Phone Number</label>
          <input required type="tel" id="phone" class="input w-full" placeholder="(123) 456-7890" />
  
          <label class="label">Website</label>
          <input required type="url" id="website" class="input w-full" value="https://www.westcler.org" />
  
          <label class="label">School</label>
          <select required id="school" class="select w-full">
            <option disabled selected>Pick a school</option>
            <option value="District Office">District Office</option>
            <option value="West Clermont High School">West Clermont High School</option>
            <option value="West Clermont Middle School">West Clermont Middle School</option>
            <option value="Willowville Elementary School">Willowville Elementary School</option>
            <option value="Summerside Elementary School">Summerside Elementary School</option>
            <option value="Clough Pike Elementary School">Clough Pike Elementary School</option>
            <option value="Merwin Elementary School">Merwin Elementary School</option>
            <option value="Amelia Elementary School">Amelia Elementary School</option>
            <option value="Holly Hill Elementary School">Holly Hill Elementary School</option>
            <option value="Withamsville-Tobasco Elementary School">Withamsville-Tobasco Elementary School</option>
          </select>
  
          <label class="label">Select a Photo</label>
          <div class="grid grid-cols-2 gap-x-4 gap-y-8 sm:grid-cols-3 sm:gap-x-6 lg:grid-cols-4 xl:gap-x-8">
            <div class="hidden relative" id="ae-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/ae.png" class="peer sr-only" />
                <img src="images/ae.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="ce-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/ce.png" class="peer sr-only" />
                <img src="images/ce.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="hh-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/hh.png" class="peer sr-only" />
                <img src="images/hh.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="me-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/me.png" class="peer sr-only" />
                <img src="images/me.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="se-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/se.png" class="peer sr-only" />
                <img src="images/se.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wt-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/wt.png" class="peer sr-only" />
                <img src="images/wt.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wv-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/wv.png" class="peer sr-only" />
                <img src="images/wv.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/chrome-web-store-banner.jpg" class="peer sr-only" />
                <img src="images/chrome-web-store-banner.jpg" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
    
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Emblem - Dark.png" class="peer sr-only" />
                <img src="images/WC Emblem - Dark.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Emblem - Light (1).png" class="peer sr-only" />
                <img src="images/WC Emblem - Light (1).png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Fanged.jpg" class="peer sr-only" />
                <img src="images/WC Fanged.jpg" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Primary - Dark.png" class="peer sr-only" />
                <img src="images/WC Primary - Dark.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Primary - Light.png" class="peer sr-only" />
                <img src="images/WC Primary - Light.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Wolf Logo FINAL CMYK copy.png" class="peer sr-only" />
                <img src="images/WC Wolf Logo FINAL CMYK copy.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Wolf Logo FINAL CMYK.png" class="peer sr-only" />
                <img src="images/WC Wolf Logo FINAL CMYK.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
  
            <div class="hidden relative" id="wc-image">
              <label class="cursor-pointer">
                <input type="radio" name="photo" value="images/WC Wolves LOGOTYPE.png" class="peer sr-only" />
                <img src="images/WC Wolves LOGOTYPE.png" class="border peer-checked:border-primary peer-checked:ring peer-checked:ring-primary peer-checked:ring-offset-2 peer-checked:ring-offset-base-100" />
              </label>
            </div>
          </div>
        
          <button class="btn btn-neutral mt-4">Generate</button>
        </fieldset>
      </form>
      
    </div>
  </div>

  <script src="index.js"></script>
  
</body>
</html>
